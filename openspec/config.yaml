# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Bun 1.3.x + TypeScript (ESNext, strict mode)
  Runtime: Bun (Windows)
  Framework: @opencode-ai/plugin/tui (TUI plugin) + @opencode-ai/plugin (server plugin)
  Architecture: Screaming Architecture — service layer (screenshot-service.ts) separated from UI entry (screenshot-to-chat.tsx)
  JSX: @opentui/solid via tsconfig
  Testing: bun:test (built-in), unit + integration tests for service layer
  Style: TypeScript with strict mode, no linter/formatter configured

strict_tdd: true

testing:
  runner:
    command: bun test
    framework: bun:test
    layers:
      unit: true
      integration: true
      e2e: false
  coverage:
    available: false
    command: ""
  quality:
    type_checker: bunx tsc --noEmit
    linter: ""
    formatter: ""

rules:
  proposal:
    - Include rollback plan for risky changes
    - Keep scope small — this is a focused plugin
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: bun test
  verify:
    test_command: bun test
    typecheck_command: bunx tsc --noEmit
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
